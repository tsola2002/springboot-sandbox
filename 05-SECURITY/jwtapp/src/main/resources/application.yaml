spring:
  application:
    name: jwtapp

  h2:
    console:
      enabled: true
      path: /h2-console

#  datasource:
#    url: jdbc:mysql://localhost:3306/jwtdb
#    username: root
#    password:

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

